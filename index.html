<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> portfolio-v1 </title>
    <link rel="stylesheet" href="css/main/main.css">
    <link rel="stylesheet" href="css/main/crt_filter.css">
    <link rel="stylesheet" href="css/main/interface.css">
    <link rel="stylesheet" href="css/initialization/initialization.css">
    <link rel="stylesheet" href="css/taskbar/taskbar.css">
</head>
<body>
    <div id="crt-overlay"></div>

    <!-- Initialization - Section to contain the buffer screen -->
    <section id="terminal">
        <div id="boot" class="loading-started">
            <p id="skip"> Press ESC or tap HERE to skip boot </p>
        </div>
    </section>

    <!-- Taskbar - This section is for navigation and to contain the items accessed by the user. -->
    <nav id="taskbar" class="interface-window">
        <button id="taskbaer-start-button" class="interface-button">
            <img src="assets/aurora.png" alt="Aurora">
            <span>Iniciar</span>
        </button>

        <div class="interface-divider"></div>

        <section id="taskbar-apps">

        </section>

        <div class="interface-divider"></div>

        <div id="taskbar-system" class="interface-field">
            <button id="taskbar-calendar" class="interface-button">
                <img src="assets/calendar.png" alt="calendar">
            </button>
            <p id="taskbar-clock"></p>
        </div>
    </nav>

    <script src="js/initialization/initialization.js" defer></script>
    <script src="js/taskbar/taskbar.js" defer></script>
</body>
</html>
