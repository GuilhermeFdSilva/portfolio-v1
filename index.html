<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> portfolio-v1 </title>
    <link rel="stylesheet" href="css/main/main.css">
    <link rel="stylesheet" href="css/main/crt_filter.css">
    <link rel="stylesheet" href="css/main/interface.css">
    <link rel="stylesheet" href="css/initialization/initialization.css">
    <link rel="stylesheet" href="css/taskbar/taskbar.css">
    <link rel="stylesheet" href="css/taskbar/calendar.css">
    <link rel="stylesheet" href="css/taskbar/start_menu.css">
    <link rel="stylesheet" href="css/desktop/desktop.css">
    <link rel="stylesheet" href="components/dialog/dialog.css">
</head>

<body>
    <!-- Screem filter -->
    <div id="crt-overlay"></div>

    <!-- Initialization - Section to contain the buffer screen -->
    <section id="terminal">
        <article id="boot" class="loading-started">
            <p id="skip" class="no-select"> Press ESC or tap HERE to skip boot </p>
        </article>
    </section>

    <!-- Taskbar - This section is for navigation and to contain the items accessed by the user. -->
    <nav id="taskbar" class="interface-window no-select">

        <!-- Taskbar interface -->
        <section id="taskbar-container">
            <!-- Start button -->
            <button id="taskbar-start-button" class="interface-button">
                <img src="assets/aurora.png" alt="Aurora">
                <span>Iniciar</span>
            </button>

            <div class="interface-divider"></div>

            <!-- Tasks -->
            <section id="taskbar-apps">

            </section>

            <div class="interface-divider"></div>

            <!-- System info, calendar and clock -->
            <section id="taskbar-system" class="interface-field">
                <!-- Button to acess the calendar -->
                <button id="taskbar-calendar" class="interface-button">
                    <img src="assets/calendar.png" alt="calendar">
                </button>

                <!-- Clock field -->
                <p id="taskbar-clock"></p>
            </section>
        </section>

        <!-- Start menu -->
        <section id="start-menu-container" class="interface-window">
            <!-- Start menu system title -->
            <article id="start-menu-title">
                <h3>
                    Aurora
                </h3>
                <span>
                    &copy;
                </span>
            </article>

            <!-- System container options -->
            <section id="start-menu-options-main-container">
                <!-- System aplications -->
                <section id="start-menu-programs-container" class="start-menu-options-container">
                    <section class="start-menu-option">
                        <img src="assets/apps.png" alt="Aplications" class="start-menu-option-img">
                        <p class="start-menu-option-txt">
                            Aplicativos
                        </p>
                        <p class="start-menu-option-arrow">
                            ▶
                        </p>
                        <section class="start-menu-suboptions interface-window">
                            <article class="start-menu-option">
                                <img src="assets/calendar.png" alt="Doc" class="start-menu-option-img">
                                <p class="start-menu-option-txt">
                                    Aplicativos
                                </p>
                            </article>
                            <article class="start-menu-option">
                                <img src="assets/calendar.png" alt="Doc" class="start-menu-option-img">
                                <p class="start-menu-option-txt">
                                    Aplicativos
                                </p>
                            </article>
                        </section>
                    </section>
                    <section class="start-menu-option">
                        <img src="assets/docs.png" alt="Documents" class="start-menu-option-img">
                        <p class="start-menu-option-txt">
                            Documentos
                        </p>
                        <p class="start-menu-option-arrow">
                            ▶
                        </p>
                        <section class="start-menu-suboptions interface-window">
                            <article class="start-menu-option">
                                <img src="assets/calendar.png" alt="Doc" class="start-menu-option-img">
                                <p class="start-menu-option-txt">
                                    Aplicativos
                                </p>
                            </article>
                            <article class="start-menu-option">
                                <img src="assets/calendar.png" alt="Doc" class="start-menu-option-img">
                                <p class="start-menu-option-txt">
                                    Aplicativos
                                </p>
                            </article>
                        </section>
                    </section>
                </section>

                <div class="interface-horizontal-divider"></div>

                <!-- System session options -->
                <section class="start-menu-options-container">
                    <section class="start-menu-option">
                        <img src="assets/logoff.png" alt="Log off" class="start-menu-option-img">
                        <p class="start-menu-option-txt">
                            Sair...
                        </p>
                    </section>
                    <section class="start-menu-option">
                        <img src="assets/power.png" alt="Power button" class="start-menu-option-img">
                        <p class="start-menu-option-txt">
                            Desligar...
                        </p>
                        <p class="start-menu-option-arrow">
                            ▶
                        </p>
                        <section class="start-menu-shutdown-options interface-window">
                            <article class="start-menu-option">
                                <img src="assets/restart.png" alt="Restart" class="start-menu-option-img">
                                <p class="start-menu-option-txt">
                                    Reiniciar
                                </p>
                            </article>
                            <article class="start-menu-option">
                                <img src="assets/power.png" alt="Shutdown" class="start-menu-option-img">
                                <p class="start-menu-option-txt">
                                    Desligar
                                </p>
                            </article>
                        </section>
                    </section>
                </section>
            </section>
        </section>

        <!-- Calendar -->
        <section id="taskbar-calendar-container" class="interface-window">
            <!-- Calendar tiblebar  -->
            <article id="titlebar-calendar" class="interface-title-bar">
                <p id="month-year"></p>
                <button class="calendar-interface-button interface-button" onclick="minusMonth()"> ▲ </button>
                <button class="calendar-interface-button interface-button" onclick="plusMonth()"> ▼ </button>
            </article>

            <!-- Days and days of the week container -->
            <article id="container-dates" class="interface-field"></article>
        </section>
    </nav>

    <!-- Desktop -->
    <main>

    </main>

    <script src="js/initialization/initialization.js" defer></script>
    <script src="js/taskbar/calendar-clock.js" defer></script>
    <script src="js/taskbar/start_menu.js" defer></script>
    <script src="js/taskbar/calendar.js" defer></script>
    <script src="components/dialog/dialog.js" defer></script>
</body>

</html>
