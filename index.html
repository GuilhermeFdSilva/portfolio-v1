<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> portfolio-v1 </title>
    <link rel="stylesheet" href="css/main.css">
    <link rel="stylesheet" href="css/crt_filter.css">
    <link rel="stylesheet" href="css/initialization.css">
    <link rel="stylesheet" href="css/taskbar.css">
</head>
<body>
    <div id="crt-overlay"></div>

    <!-- Initialization - Section to contain the buffer screen -->
    <section id="terminal">
        <div id="boot" class="loading-started">
            <p id="skip"> Press ESC or tap HERE to skip boot </p>
        </div>
    </section>

    <!-- Taskbar - This section is for navigation and to contain the items accessed by the user. -->
    <nav id="taskbar">
        <button id="start-button">
            <img src="" alt="">
        </button>

        <section id="taskbar-apps">

        </section>

        <div id="taskbar-system">
            <p id="clock">  </p>
            <p id="calendar">  </p>
        </div>
    </nav>

    <script src="js/initialization.js" defer></script>
</body>
</html>
