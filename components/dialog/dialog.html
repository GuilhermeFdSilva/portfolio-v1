<section class="interface-window interface-draggable dialog no-select" role="dialog">
  <header class="interface-title-bar drag-handle">
    <section class="interface-title-identity">
      <img class="interface-task-icon dialog-task-icon" alt="icon">
      <p class="interface-title-text"></p>
    </section>

    <section class="interface-window-controls" aria-label="Controles da janela">
      <button type="button" class="dialog-close interface-button interface-close-button" aria-label="Fechar" title="Fechar">
        <span aria-hidden="true">X</span>
      </button>
    </section>
  </header>

  <article class="interface-main-content dialog-main-container">
    <p class="dialog-icon">X</p>
    <p class="dialog-message dialog-main-content"></p>
  </article>

  <article class="interface-footer-content">
    <button class="dialog-confirm interface-button interface-window-button">
      <p>OK</p>
    </button>
  </article>
</section>
